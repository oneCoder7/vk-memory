version: "3.9"

name: viking-memory-local-stack

services:
  mem0:
    build:
      context: https://github.com/mem0ai/mem0.git#main:server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_COLLECTION_NAME=memories
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mem0graph
      - OPENAI_API_KEY=${MEM0_LLM_API_KEY}
      - OPENAI_BASE_URL=${MEM0_LLM_BASE_URL:-https://api.openai.com/v1}
    ports:
      - "${HOST_MEM0_PORT:-18888}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - mem0_history:/app/history

  mem0-configurator:
    image: curlimages/curl:8.11.1
    restart: "no"
    env_file:
      - .env
    depends_on:
      mem0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/configure-mem0.sh"]
    volumes:
      - ./configure-mem0.sh:/opt/configure-mem0.sh:ro

  postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "128mb"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mem0_postgres:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26.4
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/mem0graph
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 40s
    volumes:
      - mem0_neo4j:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${HOST_QDRANT_PORT:-16333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  infinity-embed:
    image: michaelf34/infinity:latest-cpu
    restart: unless-stopped
    command:
      - "v2"
      - "--engine"
      - "optimum"
      - "--model-id"
      - "BAAI/bge-m3"
      - "--port"
      - "7997"
    ports:
      - "${HOST_EMBEDDING_PORT:-17997}:7997"
    volumes:
      - infinity_cache:/app/.cache

  infinity-rerank:
    image: michaelf34/infinity:latest-cpu
    restart: unless-stopped
    command:
      - "v2"
      - "--engine"
      - "optimum"
      - "--model-id"
      - "BAAI/bge-reranker-v2-m3"
      - "--port"
      - "7998"
    ports:
      - "${HOST_RERANK_PORT:-17998}:7998"
    volumes:
      - infinity_cache:/app/.cache

volumes:
  mem0_history:
  mem0_postgres:
  mem0_neo4j:
  qdrant_data:
  infinity_cache:
