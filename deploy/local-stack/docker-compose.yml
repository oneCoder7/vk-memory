name: viking-memory-local-stack

services:
  mem0:
    build:
      context: https://github.com/mem0ai/mem0.git#main:server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${MEM0_LLM_API_KEY}
      - MEM0_LLM_API_KEY=${MEM0_LLM_API_KEY}
      - MEM0_LLM_BASE_URL=${MEM0_LLM_BASE_URL:-https://api.openai.com/v1}
      - MEM0_LLM_MODEL=${MEM0_LLM_MODEL:-gpt-4.1-nano-2025-04-14}
      - MEM0_EMBED_BASE_URL=http://infinity-embed:7997
      - MEM0_EMBED_MODEL=BAAI/bge-m3
      - MEM0_EMBED_DIMS=1024
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_NAME=memories
    ports:
      - "${HOST_MEM0_PORT:-18888}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    depends_on:
      qdrant:
        condition: service_started
      infinity-embed:
        condition: service_started
    volumes:
      - mem0_history:/app/history
      - ./mem0-main.py:/app/main.py:ro

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${HOST_QDRANT_PORT:-16333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  infinity-embed:
    image: michaelf34/infinity:0.0.75
    restart: unless-stopped
    command:
      - "v2"
      - "--engine"
      - "torch"
      - "--no-model-warmup"
      - "--no-bettertransformer"
      - "--no-compile"
      - "--model-id"
      - "BAAI/bge-m3"
      - "--port"
      - "7997"
    ports:
      - "${HOST_EMBEDDING_PORT:-17997}:7997"
    volumes:
      - infinity_cache:/app/.cache

  infinity-rerank:
    image: michaelf34/infinity:0.0.75
    restart: unless-stopped
    command:
      - "v2"
      - "--engine"
      - "torch"
      - "--no-model-warmup"
      - "--no-bettertransformer"
      - "--no-compile"
      - "--model-id"
      - "BAAI/bge-reranker-v2-m3"
      - "--port"
      - "7998"
    ports:
      - "${HOST_RERANK_PORT:-17998}:7998"
    volumes:
      - infinity_cache:/app/.cache

volumes:
  mem0_history:
  qdrant_data:
  infinity_cache:
